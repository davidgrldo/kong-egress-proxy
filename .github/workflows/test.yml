name: test

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install luacheck
        run: sudo apt-get update -q && sudo apt-get install -y -q lua-check
      - name: Run luacheck
        run: luacheck .

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lua 5.1
        run: sudo apt-get update -q && sudo apt-get install -y -q lua5.1
      - name: Run unit tests
        run: LUA_PATH="./?.lua;./plugins/egress-proxy/?.lua;;" lua5.1 spec/run.lua

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run e2e (Kong 3.9 DB-less + Squid + echo)
        run: e2e/run.sh

  # The e2e stack mounts the source directly, so this is the only place the
  # published install path (rockspec git fetch + non-standard source.dir) is
  # exercised. Requires the tag referenced by the rockspec to be pushed.
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install luarocks
        run: sudo apt-get update -q && sudo apt-get install -y -q luarocks
      - name: Install the plugin from the rockspec (fetches the git tag)
        run: luarocks install --tree ./rocktree plugins/egress-proxy/kong-egress-proxy-*.rockspec
      - name: Assert the plugin modules landed
        run: |
          ls ./rocktree/share/lua/*/kong/plugins/egress-proxy/handler.lua
          ls ./rocktree/share/lua/*/kong/plugins/egress-proxy/schema.lua
          ls ./rocktree/share/lua/*/kong/plugins/egress-proxy/proxy.lua
